<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Inicio de Sesión</title>
    <link rel="icon" href="icon/Logon_theapplication_2961.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="css/general.css">
    <link rel="stylesheet" href="css/index.css">
</head>

<body>

    <main id="login-card">

        <img src="img/Logo2.png" alt="Logo ESPE">

        <h1>Portal de Autenticación</h1>

        <h2>Sistema de Reservas - ESPE</h2>

        <p>Acceso restringido a personal autorizado</p>

        <form class="formulario-login" action="pages/Reserva/Reserva.html" method="post">
            <label for="correo">Correo Electrónico</label>
            <br><br>
            <input type="email" id="correo" name="correo" placeholder="usuario@espe.edu.ec" required>
            <br><br><br>
            <label for="contrasena">Contraseña</label>
            <br><br>
            <input type="password" id="contrasena" name="contrasena" placeholder="Ingrese su contraseña"
                pattern="(?=.*\d)(?=.*[a-z])(?=.*[A-Z]).{8,}"
                title="Debe contener al menos un número, una letra mayúscula, una letra minúscula y tener mínimo 8 caracteres"
                required>
            <br><br><br>
            <input class="btn-ingresar" title="Inicia Sesión" type="submit" value="Iniciar Sesión">
        </form>

        <p class="enlace-recuperar">
            <a title="Recuperar Contraseña" href="pages/RecuperarContrasena/RecuperarContrasena.html">
                ¿Olvidaste tu contraseña?
            </a>
        </p>

        <hr>

        <footer>
            Universidad de las Fuerzas Armadas "ESPE"
            <p>Santo Domingo - Ecuador</p>
        </footer>

    </main>

</body>

</html>
