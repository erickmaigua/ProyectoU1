<!DOCTYPE html>
<html lang="es" style="background-color:#DCFCE7; font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; margin:0;">

<head>
    <meta charset="UTF-8">
    <title>Confirmación de Reserva</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body style="display:flex; justify-content:center; align-items:center; min-height:100vh;">
    <main style="width:380px; background:white; border-radius:28px; overflow:hidden; box-shadow:0 15px 30px rgba(0,0,0,0.12);">
        <header style="background:#00B63E; padding:35px 30px; text-align:center; color:white; position:relative;">
            <a href="../Reserva/Reserva.html"
                style="position:absolute; top:20px; right:20px; text-decoration:none; background:rgba(255,255,255,0.2); width:35px; height:35px; border-radius:50%; line-height:35px; color:white; font-size:22px;">
                ×
            </a>
            <span style="display:block; width:75px; height:75px; line-height:75px; border-radius:50%; background:rgba(255,255,255,0.2); margin:auto; font-size:38px;">
                <i class="fa-solid fa-check" style="color:white;"></i>
            </span>
            <h1 style="margin-top:20px; margin-bottom:10px; font-size:30px;">
                ¡Reserva Confirmada!
            </h1>
            <p style="margin:0; font-size:15px;">
                Tu pase digital está listo
            </p>
        </header>
        <article style="padding:30px;">
            <h2 style="font-size:12px; color:#64748B; margin-bottom:5px;">
                ESTUDIANTE
            </h2>
            <p style="margin-top:0; margin-bottom:22px; font-size:20px; color:#0F172A; font-weight:600;">
                Juan Pérez
            </p>
            <h2 style="font-size:12px; color:#64748B; margin-bottom:5px;">
                LABORATORIO
            </h2>
            <p style="margin-top:0; margin-bottom:5px; font-size:20px; color:#0F172A; font-weight:600;">
                Laboratorio de Cómputo 1
            </p>
            <p style="margin-top:0; margin-bottom:25px; color:#475569; font-size:14px;">
                Bloque A
            </p>
            <table style="width:100%; margin-bottom:25px;">
                <tr>
                    <td>
                        <h3 style="font-size:12px; color:#64748B; margin-bottom:5px;">
                            FECHA
                        </h3>
                        <strong style="font-size:15px; color:#0F172A;">
                            15 de Mayo, 2026
                        </strong>
                    </td>
                    <td>
                        <h3 style="font-size:12px; color:#64748B; margin-bottom:5px;">
                            HORA
                        </h3>
                        <strong style="font-size:15px; color:#0F172A;">
                            14:00 - 16:00
                        </strong>
                    </td>
                </tr>
            </table>
            <hr style="border:none; border-top:1px solid #E2E8F0; margin:25px 0;">
            <p style="text-align:center; color:#475569; font-size:14px;">
                Escanea este código para ingresar al laboratorio
            </p>
            <figure style="text-align:center; margin:25px 0;">
                <img src="../../img/qr.png"
                    alt="Código QR"
                    width="210"
                    style="border:5px solid #00B63E; border-radius:20px; padding:10px; background:white;">
            </figure>
            <hr style="border:none; border-top:1px solid #E2E8F0; margin:25px 0;">
            <a href="../Reserva/Reserva.html"
                style="display:block; text-align:center; text-decoration:none; background:#00B63E; color:white; padding:15px; border-radius:14px; font-weight:600; margin-bottom:15px;">
                Entendido
            </a>
            <button
                style="width:100%; background:#E5E7EB; border:none; padding:15px; border-radius:14px; color:#334155; font-size:15px; cursor:pointer;">
                Descargar Pase
            </button>
            <footer style="text-align:center; margin-top:20px; color:#64748B; font-size:11px;">
                Presenta este código QR al ingresar al laboratorio
            </footer>
        </article>
    </main>
</body>

</html>
