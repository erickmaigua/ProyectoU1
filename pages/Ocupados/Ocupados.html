<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8">
    <title>Laboratorios Ocupados</title>
    <link rel="icon" href="../../icon/Computer_PC_Monitor_1906.ico" type="image/x-icon">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../../css/general.css">
    <link rel="stylesheet" href="../../css/ocupados.css">
</head>

<body>

    <header>

        <figure>
            <img src="../../img/Logo.png" alt="Logo ESPE" width="70">
            <figcaption>
                <h1>Laboratorios Ocupados</h1>
                <p>Sistema Académico ESPE Santo Domingo</p>
            </figcaption>
        </figure>

        <form action="../../index.html">
            <button class="btn-cerrar-sesion">
                <i class="fa-solid fa-right-from-bracket"></i>
                Cerrar sesión
            </button>
        </form>

    </header>

    <nav>
        <a href="../Reserva/Reserva.html">
            <i class="fa-solid fa-border-all"></i>
            Todos
        </a>
        <a href="../Disponibles/Disponibles.html">
            <i class="fa-solid fa-door-open" style="color:#2ecc71;"></i>
            Disponibles
        </a>
        <a href="../Ocupados/Ocupados.html" class="activo">
            <i class="fa-solid fa-door-closed" style="color:#E74C3C;"></i>
            Ocupados
        </a>
    </nav>

    <main id="grilla-ocupados">

        <article class="tarjeta ocupado">
            <header>
                <h2>Laboratorio de Redes</h2>
                <p>Bloque B</p>
            </header>
            <section>
                <h3>Software Disponible</h3>
                <ul class="lista-software-ul">
                    <li>Packet Tracer</li>
                    <li>Wireshark</li>
                    <li>GNS3</li>
                </ul>
                <p class="capacidad">Capacidad: <strong>25 estaciones</strong></p>
                <hr>
                <footer>
                    <span class="badge-ocupado">OCUPADO</span>
                    <button class="btn-reservado" disabled>Reservado</button>
                </footer>
            </section>
        </article>

    </main>

</body>

</html>
